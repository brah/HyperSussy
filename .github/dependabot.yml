# Dependabot configuration — weekly automated dependency PRs.
#
# Covers Python (pyproject.toml), the React frontend (package.json),
# and the GitHub Actions used by workflows in this repository.
#
# Reference: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Python backend — pyproject.toml + uv.lock
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    groups:
      python-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "deps(py)"

  # React frontend
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    groups:
      npm-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "deps(fe)"
    ignore:
      # Hold major React upgrades for manual review — they require codemods
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]

  # The GitHub Actions used inside .github/workflows/*.yml
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "deps(ci)"
