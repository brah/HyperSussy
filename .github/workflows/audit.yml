# Security audit: scan Python and npm dependencies for known vulnerabilities.
#
# Runs on:
#   - weekly schedule (Monday 06:00 UTC)
#   - any change to lockfiles or this workflow on main / PRs
#   - manual dispatch

name: Audit

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - ".github/workflows/audit.yml"
  pull_request:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - "frontend/package.json"
      - "frontend/package-lock.json"

jobs:
  python-audit:
    name: pip-audit (Python)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: pip-audit
        # Scans pyproject.toml + lockfile for known vulns in PyPI deps
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: pyproject.toml

  npm-audit:
    name: npm audit (Frontend)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit (production deps, high+ severity)
        run: npm audit --omit=dev --audit-level=high
