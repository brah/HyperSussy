# Security audit: scan Python and npm dependencies for known vulnerabilities.
#
# Runs on:
#   - weekly schedule (Monday 06:00 UTC)
#   - any change to lockfiles or this workflow on main / PRs
#   - manual dispatch

name: Audit

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - ".github/workflows/audit.yml"
  pull_request:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - "frontend/package.json"
      - "frontend/package-lock.json"

jobs:
  python-audit:
    name: pip-audit (Python)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Sync project (with dev extras)
        run: uv sync --extra dev

      # Audit the synced uv environment via pip-audit. We invoke pip-audit
      # through `uv run --with` so it inherits the project's installed
      # packages and audits exactly what `uv sync` produced — no need to
      # transcode pyproject.toml to a requirements.txt.
      - name: pip-audit
        run: uv run --with pip-audit pip-audit

  npm-audit:
    name: npm audit (Frontend)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit (production deps, high+ severity)
        run: npm audit --omit=dev --audit-level=high
